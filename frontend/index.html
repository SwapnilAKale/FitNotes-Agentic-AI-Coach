<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitNotes Coach</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; font-family: system-ui, sans-serif; }
    #chat { scrollbar-width: thin; scrollbar-color: #334155 transparent; }
    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    .bubble-user { background: #1d4ed8; }
    .bubble-agent { background: #1e293b; }
    .bubble-error { background: #7f1d1d; color: #fca5a5; }
    #attach-menu {
      display: none;
      position: absolute;
      bottom: 56px;
      left: 0;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
      min-width: 200px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 50;
    }
    #attach-menu.open { display: block; }
    #attach-menu button {
      display: block;
      width: 100%;
      padding: 10px 16px;
      text-align: left;
      font-size: 13px;
      color: #cbd5e1;
      background: transparent;
      border: none;
      cursor: pointer;
    }
    #attach-menu button:hover { background: #334155; color: white; }
    #attach-menu button:not(:last-child) { border-bottom: 1px solid #334155; }
    .thinking-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #94a3b8;
      animation: bounce 1.2s infinite;
    }
    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #3b82f6;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
  </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-white">

  <!-- Header -->
  <div class="flex items-center px-5 py-3 border-b border-slate-700/50 bg-slate-900/50 flex-shrink-0">
    <div class="w-7 h-7 rounded-full bg-blue-600 flex items-center justify-center text-xs font-bold mr-3 flex-shrink-0">FC</div>
    <div>
      <div class="font-semibold text-sm text-white">FitNotes Coach</div>
      <div class="text-xs text-gray-500">AI-powered strength companion</div>
    </div>
  </div>

  <!-- Initialization banner -->
  <div id="init-banner"
    class="flex items-center gap-3 px-5 py-2 text-sm text-blue-300 bg-blue-950 border-b border-blue-800 flex-shrink-0"
    style="display:none">
    <div class="spinner"></div>
    <span>Connecting to your fitness coach...</span>
  </div>

  <!-- Chat area -->
  <div id="chat" class="flex-1 overflow-y-auto py-6 px-4">
    <div class="max-w-2xl mx-auto space-y-1">
    </div>
  </div>

  <!-- Input area -->
  <div class="flex-shrink-0 border-t border-slate-700/50 bg-slate-900/30 px-4 py-4">
    <div class="max-w-2xl mx-auto">
      <div class="relative flex items-end gap-2 bg-slate-800 rounded-2xl px-3 py-2 border border-slate-700 focus-within:border-blue-500 transition-colors">

        <!-- Attach button + menu -->
        <div class="relative flex-shrink-0" id="attach-wrapper">
          <button id="attach-btn"
            class="w-8 h-8 rounded-lg text-gray-400 hover:text-white hover:bg-slate-700 disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center transition-colors"
            title="Upload files">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <div id="attach-menu">
            <button id="db-btn">📦 Upload Backup (.fitnotes)</button>
            <button id="article-btn">📄 Add Article (PDF)</button>
          </div>
        </div>

        <!-- Hidden inputs -->
        <input type="file" id="db-input" accept=".fitnotes" class="hidden">
        <input type="file" id="article-input" accept=".pdf" class="hidden">

        <!-- Textarea -->
        <textarea id="input"
          placeholder="Ask your fitness coach..."
          rows="1"
          class="flex-1 bg-transparent text-sm text-white placeholder-gray-500 resize-none outline-none py-1 leading-5"
          style="max-height: 128px; scrollbar-width: thin;"></textarea>

        <!-- Send button -->
        <button id="send-btn"
          class="flex-shrink-0 w-8 h-8 rounded-lg bg-blue-600 hover:bg-blue-500 disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center transition-colors"
          title="Send">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <div class="text-center text-xs text-gray-600 mt-2">FitNotes Coach can make mistakes. Verify important information.</div>
    </div>
  </div>

  <!-- Confirmation card (hidden by default) -->
  <div id="confirm-bar" class="hidden flex-shrink-0 border-t border-yellow-800 bg-yellow-950/50 px-4 py-3">
    <div class="max-w-2xl mx-auto">
      <p class="text-sm text-yellow-200 mb-3 font-medium">Confirm this action?</p>
      <p id="confirm-preview" class="text-xs text-yellow-300/70 mb-3 font-mono whitespace-pre-wrap"></p>
      <div class="flex gap-2">
        <button id="confirm-yes" class="px-4 py-1.5 bg-green-700 hover:bg-green-600 text-white text-sm rounded-lg">Confirm</button>
        <button id="confirm-no" class="px-4 py-1.5 bg-slate-600 hover:bg-slate-500 text-white text-sm rounded-lg">Cancel</button>
      </div>
    </div>
  </div>

<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
const API = 'http://localhost:8000';
let busy = false;
let lastQuestion = null;
let autoRetryTimer = null;

function nowTime() {
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function chatInner() {
  return document.querySelector('#chat > div');
}

function scrollBottom() {
  const c = document.getElementById('chat');
  c.scrollTop = c.scrollHeight;
}

function setBusy(b) {
  busy = b;
  document.getElementById('input').disabled = b;
  document.getElementById('send-btn').disabled = b;
  document.getElementById('attach-btn').disabled = b;
  if (!b) document.getElementById('input').focus();
}

// ── Message rendering ─────────────────────────────────────────────────────────
function addMsg(role, html, time) {
  const inner = chatInner();
  const wrap = document.createElement('div');
  const col = document.createElement('div');
  col.className = 'flex flex-col max-w-xl';
  const bubble = document.createElement('div');
  const ts = document.createElement('div');
  ts.className = 'text-xs text-gray-500 mt-1';
  ts.textContent = time || nowTime();

  if (role === 'user') {
    wrap.className = 'flex justify-end mb-3';
    col.style.alignItems = 'flex-end';
    bubble.className = 'bubble-user rounded-2xl rounded-tr-sm px-4 py-2.5 text-white text-sm';
    bubble.innerHTML = html;
  } else if (role === 'error') {
    wrap.className = 'flex justify-start mb-3';
    bubble.className = 'bubble-error rounded-2xl px-4 py-2.5 text-sm';
    bubble.innerHTML = html;
    ts.className += ' text-left';
  } else {
    wrap.className = 'flex items-start gap-2 mb-3';
    const av = document.createElement('div');
    av.className = 'w-7 h-7 rounded-full bg-blue-600 flex items-center justify-center text-xs font-bold flex-shrink-0 mt-0.5';
    av.textContent = 'FC';
    col.className = 'flex flex-col max-w-xl';
    bubble.className = 'bubble-agent rounded-2xl rounded-tl-sm px-4 py-2.5 text-gray-100 text-sm';
    bubble.innerHTML = html.replace(/\n/g, '<br>');
    ts.className += ' text-left';
    col.appendChild(bubble);
    col.appendChild(ts);
    wrap.appendChild(av);
    wrap.appendChild(col);
    inner.appendChild(wrap);
    scrollBottom();
    return bubble;
  }

  col.appendChild(bubble);
  col.appendChild(ts);
  wrap.appendChild(col);
  inner.appendChild(wrap);
  scrollBottom();
  return bubble;
}

function addThinking() {
  const inner = chatInner();
  const wrap = document.createElement('div');
  wrap.className = 'flex items-start gap-2 mb-3';
  wrap.id = 'thinking-row';
  const av = document.createElement('div');
  av.className = 'w-7 h-7 rounded-full bg-blue-600 flex items-center justify-center text-xs font-bold flex-shrink-0 mt-0.5';
  av.textContent = 'FC';
  const bubble = document.createElement('div');
  bubble.className = 'bubble-agent rounded-2xl rounded-tl-sm px-4 py-3 text-sm';
  bubble.innerHTML = '<span class="thinking-dot"></span><span class="thinking-dot"></span><span class="thinking-dot"></span>';
  wrap.appendChild(av);
  wrap.appendChild(bubble);
  inner.appendChild(wrap);
  scrollBottom();
  return wrap;
}

function removeThinking() {
  const el = document.getElementById('thinking-row');
  if (el) el.remove();
}

function addWelcomeMessage() {
  addMsg('agent', "Hello! I'm your FitNotes coach. Ask me about your workouts, PRs, or log new sessions.");
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastCount = 0;

function showToast(msg, isError = false) {
  toastCount++;
  const offset = (toastCount - 1) * 60;
  const t = document.createElement('div');
  t.className = `fixed right-4 max-w-xs px-4 py-3 rounded-xl text-sm font-medium shadow-xl z-50 transition-all ${isError ? 'bg-red-900 text-red-200' : 'bg-green-800 text-green-100'}`;
  t.style.top = `${16 + offset}px`;
  t.style.wordBreak = 'break-word';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => {
    t.remove();
    toastCount = Math.max(0, toastCount - 1);
  }, 4000);
}

// ── Error handlers ────────────────────────────────────────────────────────────
function handleOverloadError() {
  if (autoRetryTimer) { clearInterval(autoRetryTimer); autoRetryTimer = null; }
  const inner = chatInner();
  const row = document.createElement('div');
  row.className = 'flex justify-start mb-3';
  row.innerHTML = `
    <div class="flex flex-col gap-2 max-w-sm">
      <div class="bubble-error rounded-2xl px-4 py-2.5 text-sm" id="overload-msg">
        Gemini is under high demand. Retrying in 120s...
      </div>
      <div class="flex gap-2">
        <button id="retry-now-btn" class="px-3 py-1 bg-green-700 hover:bg-green-600 text-white text-xs rounded-lg">Retry Now</button>
        <button id="cancel-retry-btn" class="px-3 py-1 bg-slate-600 hover:bg-slate-500 text-white text-xs rounded-lg">Cancel</button>
      </div>
      <div class="text-xs text-gray-500">${nowTime()}</div>
    </div>`;
  inner.appendChild(row);
  scrollBottom();

  const msgEl = document.getElementById('overload-msg');
  let remaining = 120;

  function cleanup() {
    clearInterval(autoRetryTimer);
    autoRetryTimer = null;
    row.remove();
    setBusy(false);
  }

  document.getElementById('retry-now-btn').addEventListener('click', () => {
    cleanup();
    if (lastQuestion) sendMessage(lastQuestion);
  });
  document.getElementById('cancel-retry-btn').addEventListener('click', () => {
    cleanup();
    lastQuestion = null;
  });

  autoRetryTimer = setInterval(() => {
    remaining--;
    if (remaining > 0) {
      msgEl.textContent = `Gemini is under high demand. Retrying in ${remaining}s...`;
    } else {
      cleanup();
      if (lastQuestion) sendMessage(lastQuestion);
    }
  }, 1000);
}

function handleRateLimitError(retryAfterSeconds) {
  if (autoRetryTimer) { clearInterval(autoRetryTimer); autoRetryTimer = null; }
  addMsg('error', 'Daily quota reached. Come back after 12:30 PM IST when quota resets.');
  setBusy(false);
}

// ── History restore ───────────────────────────────────────────────────────────
function restoreHistory(history) {
  chatInner().innerHTML = '';
  history.forEach(m => {
    const role = m.role === 'user' ? 'user' : 'agent';
    const time = m.timestamp
      ? new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})
      : null;
    addMsg(role, esc(m.text), time);
  });
}

// ── Init / ready polling ──────────────────────────────────────────────────────
async function waitForReady() {
  document.getElementById('init-banner').style.display = 'flex';
  setBusy(true);
  let failCount = 0;

  while (true) {
    try {
      const res = await fetch(`${API}/status`);
      const data = await res.json();
      failCount = 0;
      if (data.ready) break;
    } catch (e) {
      failCount++;
      if (failCount >= 1) {
        // Frontend-only mode — no backend running
        document.getElementById('init-banner').style.display = 'none';
        addWelcomeMessage();
        setBusy(false);
        return;
      }
    }
    await new Promise(r => setTimeout(r, 1000));
  }

  document.getElementById('init-banner').style.display = 'none';
  try {
    const hist = await fetch(`${API}/history`).then(r => r.json());
    if (hist.history && hist.history.length > 0) {
      restoreHistory(hist.history);
    } else {
      addWelcomeMessage();
    }
  } catch {
    addWelcomeMessage();
  }
  setBusy(false);
}

// ── Send message ──────────────────────────────────────────────────────────────
async function sendMessage(forcedText) {
  const input = document.getElementById('input');
  const text = forcedText || input.value.trim();
  if (!text || busy) return;

  if (!forcedText) input.value = '';
  input.style.height = 'auto';
  lastQuestion = text;
  addMsg('user', esc(text));
  setBusy(true);
  const thinking = addThinking();

  try {
    const res = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text})
    });
    const data = await res.json();
    removeThinking();

    if (res.status === 429) {
      if (data.error === 'rate_limit') handleRateLimitError(data.retry_after_seconds);
      else setBusy(false);
    } else if (data.error === 'overload') {
      handleOverloadError();
    } else if (data.type === 'confirmation_required') {
      document.getElementById('confirm-preview').textContent = data.preview || '';
      document.getElementById('confirm-bar').classList.remove('hidden');
      setBusy(false);
    } else if (data.type === 'not_ready') {
      addMsg('error', 'Still initializing — please wait a moment.');
      setBusy(false);
    } else if (data.type === 'error') {
      addMsg('error', esc(data.text || 'An error occurred.'));
      setBusy(false);
    } else {
      addMsg('agent', esc(data.text || ''));
      setBusy(false);
    }
  } catch (err) {
    removeThinking();
    addMsg('error', 'Could not reach the server.');
    setBusy(false);
  }
}

// ── Confirm / cancel ──────────────────────────────────────────────────────────
async function sendConfirm(confirmed) {
  document.getElementById('confirm-bar').classList.add('hidden');
  setBusy(true);
  const thinking = addThinking();
  try {
    const res = await fetch(`${API}/confirm`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({confirmed})
    });
    const data = await res.json();
    removeThinking();
    if (data.type === 'answer') addMsg('agent', esc(data.text || ''));
    else if (data.type === 'error') addMsg('error', esc(data.text || 'Error.'));
    else addMsg('agent', esc(data.text || ''));
  } catch {
    removeThinking();
    addMsg('error', 'Could not reach the server.');
  }
  setBusy(false);
}

// ── Upload handlers ───────────────────────────────────────────────────────────
document.getElementById('db-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  const fd = new FormData();
  fd.append('file', file);
  try {
    const res = await fetch(`${API}/upload`, {method:'POST', body:fd});
    const data = await res.json();
    if (data.status === 'reloading') {
      showToast('Database uploaded. Reconnecting...');
      waitForReady();
    } else if (data.status === 'ok') {
      showToast('Database already up to date.');
    } else if (data.status === 'warning') {
      showUploadWarning(data.warnings, async () => {
        const r = await fetch(`${API}/upload/confirm`, {method:'POST'});
        const d = await r.json();
        if (d.status === 'reloading') { showToast('Database uploaded. Reconnecting...'); waitForReady(); }
      });
    } else {
      showToast(data.errors?.[0] || data.message || 'Upload failed.', true);
    }
  } catch { showToast('Upload failed — could not reach server.', true); }
});

document.getElementById('article-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  showToast(`Processing "${file.name}"...`);
  const fd = new FormData();
  fd.append('file', file);
  try {
    const res = await fetch(`${API}/upload/article`, {method:'POST', body:fd});
    const data = await res.json();
    if (data.status === 'ok') {
      showToast(`✓ ${data.message}`);
    } else {
      const msg = data.message || '';
      let toastMsg;
      if (msg.includes('PDF')) toastMsg = 'Only PDF files are supported.';
      else if (msg.includes('too short')) toastMsg = 'PDF is too short. Try a longer document.';
      else if (msg.includes('structural marker')) toastMsg = "Doesn't look like a research article. Try uploading a study or paper.";
      else if (msg.includes('fitness') || msg.includes('health related')) toastMsg = 'Article must be fitness or health related.';
      else if (msg.includes('scanned') || msg.includes('image-based')) toastMsg = 'Scanned PDFs not supported. Use a text-based PDF.';
      else toastMsg = 'Upload failed. Try a fitness research article in PDF format.';
      showToast(toastMsg, true);
    }
  } catch { showToast('Upload failed — could not reach server.', true); }
});

// ── Upload warning modal ──────────────────────────────────────────────────────
function showUploadWarning(warnings, onConfirm) {
  const modal = document.createElement('div');
  modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50';
  modal.innerHTML = `
    <div class="bg-slate-800 rounded-xl p-6 max-w-md w-full mx-4 border border-slate-700">
      <h3 class="text-white font-semibold mb-3">⚠️ Upload Warning</h3>
      <p class="text-gray-300 text-sm mb-4">${warnings.map(w => esc(w)).join('<br>')}</p>
      <div class="flex gap-3">
        <button id="upload-proceed" class="flex-1 py-2 bg-yellow-600 hover:bg-yellow-500 text-white rounded-lg text-sm">Upload Anyway</button>
        <button id="upload-cancel" class="flex-1 py-2 bg-slate-600 hover:bg-slate-500 text-white rounded-lg text-sm">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  document.getElementById('upload-proceed').addEventListener('click', () => { modal.remove(); onConfirm(); });
  document.getElementById('upload-cancel').addEventListener('click', () => { modal.remove(); showToast('Upload cancelled.'); });
}

// ── Attach menu ───────────────────────────────────────────────────────────────
document.getElementById('attach-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('attach-menu').classList.toggle('open');
});
document.getElementById('db-btn').addEventListener('click', () => {
  document.getElementById('attach-menu').classList.remove('open');
  document.getElementById('db-input').click();
});
document.getElementById('article-btn').addEventListener('click', () => {
  document.getElementById('attach-menu').classList.remove('open');
  document.getElementById('article-input').click();
});
document.addEventListener('click', (e) => {
  if (!document.getElementById('attach-wrapper').contains(e.target)) {
    document.getElementById('attach-menu').classList.remove('open');
  }
});

// ── Input behaviour ───────────────────────────────────────────────────────────
document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 128) + 'px';
});
document.getElementById('input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('send-btn').addEventListener('click', () => sendMessage());

// ── Confirm buttons ───────────────────────────────────────────────────────────
document.getElementById('confirm-yes').addEventListener('click', () => sendConfirm(true));
document.getElementById('confirm-no').addEventListener('click', () => sendConfirm(false));

// ── Boot ──────────────────────────────────────────────────────────────────────
waitForReady();
</script>
</body>
</html>
